name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  check:
    name: TypeScript + Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Dummy values for build-time checks (not used at runtime)
          DATABASE_URL: "postgresql://x:x@localhost:5432/x"
          NEXTAUTH_SECRET: "ci-build-dummy-secret-not-for-production"
          NEXTAUTH_URL: "http://localhost:3000"

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (production only)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true  # Advisory: don't block on moderate
