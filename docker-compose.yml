services:
  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: comfortplus_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-comfortplus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-comfortplus123}
      POSTGRES_DB: ${POSTGRES_DB:-comfortplus_erp}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-comfortplus} -d ${POSTGRES_DB:-comfortplus_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js App ──────────────────────────────────────────────
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comfortplus_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-comfortplus}:${POSTGRES_PASSWORD:-comfortplus123}@postgres:5432/${POSTGRES_DB:-comfortplus_erp}"
      AUTH_TRUST_HOST: "true"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # ── DB Migration (on-demand) ─────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: comfortplus_migrate
    profiles: ["migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-comfortplus}:${POSTGRES_PASSWORD:-comfortplus123}@postgres:5432/${POSTGRES_DB:-comfortplus_erp}"
    networks:
      - internal
    command: npx prisma db push --schema prisma/schema
    working_dir: /app

  # ── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: comfortplus_nginx
    restart: unless-stopped
    depends_on:
      nextjs:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:

networks:
  internal:
    driver: bridge
