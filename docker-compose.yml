services:
  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: comfortplus_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — do not use default passwords in production}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js App ──────────────────────────────────────────────
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    image: comfortplus-erp:${APP_VERSION:-latest}
    container_name: comfortplus_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      AUTH_TRUST_HOST: "true"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  # ── DB Migration (on-demand) ─────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    container_name: comfortplus_migrate
    profiles: ["migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}"
    networks:
      - internal
    command: npx prisma migrate deploy --schema prisma/schema
    working_dir: /app

  # ── Nginx Reverse Proxy ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: comfortplus_nginx
    restart: unless-stopped
    depends_on:
      nextjs:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── DB Backup (scheduled) ────────────────────────────────────
  backup:
    image: postgres:16
    container_name: comfortplus_backup
    restart: unless-stopped
    profiles: ["backup"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-30}
      S3_BUCKET: ${S3_BUCKET:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-ap-northeast-1}
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
      - backup_data:/backups
    networks:
      - internal
    entrypoint: ["sh", "-c", "chmod +x /backup.sh && crond -f -d 8"]
    # Inject crontab: run backup at 02:00 daily
    command: >
      sh -c "echo '0 2 * * * /backup.sh >> /var/log/backup.log 2>&1' | crontab - && crond -f -d 8"

volumes:
  postgres_data:
  nginx_logs:
  backup_data:

networks:
  internal:
    driver: bridge
