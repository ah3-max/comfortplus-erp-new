version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: comfortplus_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: comfortplus
      POSTGRES_PASSWORD: comfortplus123
      POSTGRES_DB: comfortplus_erp
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
